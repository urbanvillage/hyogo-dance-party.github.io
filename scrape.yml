name: Hyogo Dance Info Scraper

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        env:
          GMAIL_USER:       ${{ secrets.GMAIL_USER }}
          GMAIL_PASS:       ${{ secrets.GMAIL_PASS }}
          GAS_WEBHOOK_URL:  ${{ secrets.GAS_WEBHOOK_URL }}
          GAS_SECRET:       ${{ secrets.GAS_SECRET }}
          X_BEARER_TOKEN:   ${{ secrets.X_BEARER_TOKEN }}
          GS_SHEET_NAME:    ${{ secrets.GS_SHEET_NAME }}
        run: python3 hyogo_dance_scraper.py

      - name: Commit results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git add scraped_result.json known_parties.json || true
          git diff --staged --quiet || git commit -m "Auto scrape $(date '+%Y-%m-%d %H:%M')"
          git push || true
